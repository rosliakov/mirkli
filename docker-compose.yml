version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: mirkli
      POSTGRES_USER: mirkli_user
      POSTGRES_PASSWORD: secure_password_123
    restart: unless-stopped

  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./backend/media:/app/media
    environment:
      - DEBUG=False
      - SECRET_KEY=django-production-key-change-this-in-production-123456789
      - DATABASE_URL=postgresql://mirkli_user:secure_password_123@db:5432/mirkli
      - ALLOWED_HOSTS=*
    depends_on:
      - db
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             python manage.py create_demo &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./backend/staticfiles:/var/www/static
      - ./backend/media:/var/www/media
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - web
    restart: unless-stopped

volumes:
  postgres_data: